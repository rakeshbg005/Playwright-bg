name: playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Daily schedule (uncomment if needed)
#  schedule:
#    - cron: '0 0 * * *' # Runs daily at midnight
#    - cron: '0 4 * * *' # Runs daily at 4 AM
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run BDD generator
        run: npx bddgen

      - name: Run Playwright tests
        run: npm run bddtest

      - name: Install Java (required for Allure Report)
        run: sudo apt-get update && sudo apt-get install -y openjdk-11-jre

      - name: Install Allure CLI globally
        run: |
          npm install -g allure-commandline --save-dev
          echo "$(npm root -g)/.bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH
          allure --version

      - name: Generate Allure Report
        if: success() || failure()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          publish_dir: ./allure-report
    

