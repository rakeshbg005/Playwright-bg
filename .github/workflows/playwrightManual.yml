name: Manual Playwright Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment (e.g., int, staging, prod)'
        required: true
        default: 'int'
        type: choice
        options:
          - int
          - staging
          - prod
      tag:
        description: 'Test tag to run (e.g., @test1)'
        required: true
        default: '@test1'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          cross-env ENVIRONMENT=${{ github.event.inputs.environment }} npx bddgen && \
          npx playwright test --grep "${{ github.event.inputs.tag }}" --workers=1

      - name: Install Java (required for Allure Report)
        run: sudo apt-get update && sudo apt-get install -y openjdk-11-jre

      - name: Install Allure CLI globally
        run: |
          npm install -g allure-commandline --save-dev
          echo "$(npm root -g)/.bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH
          allure --version

      - name: Generate Allure Report
        if: success() || failure()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          publish_dir: ./allure-report
    


